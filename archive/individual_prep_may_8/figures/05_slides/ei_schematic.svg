<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrowE" markerWidth="12" markerHeight="10" refX="11" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10 L12,5 z" fill="#0f766e" />
    </marker>
    <marker id="barI" markerWidth="6" markerHeight="20" refX="2" refY="10"
            orient="auto" markerUnits="userSpaceOnUse">
      <rect x="0.5" y="1" width="3" height="18" rx="1.5" ry="1.5" fill="#92400e" />
    </marker>
  </defs>

  <!-- E -> I, top arc, excitatory.
       Endpoints (185, 110) and (295, 110) sit ~8 units outside their circles. -->
  <path d="M 185 110 Q 240 60 295 110" fill="none" stroke="#0f766e"
        stroke-width="2.5" marker-end="url(#arrowE)" />
  <text x="240" y="56" text-anchor="middle" fill="#0f766e"
        font-size="13" font-weight="500" letter-spacing="0.3">excites</text>

  <!-- I -> E, bottom arc, inhibitory -->
  <path d="M 295 130 Q 240 180 185 130" fill="none" stroke="#92400e"
        stroke-width="2.5" marker-end="url(#barI)" />
  <text x="240" y="200" text-anchor="middle" fill="#92400e"
        font-size="13" font-weight="500" letter-spacing="0.3">inhibits</text>

  <!-- E circle -->
  <circle cx="140" cy="120" r="38" fill="#0f766e" />
  <text x="140" y="129" text-anchor="middle" fill="white"
        font-size="26" font-weight="700">E</text>
  <text x="140" y="180" text-anchor="middle" fill="#374151" font-size="12">excitatory</text>

  <!-- I circle -->
  <circle cx="340" cy="120" r="38" fill="#92400e" />
  <text x="340" y="129" text-anchor="middle" fill="white"
        font-size="26" font-weight="700">I</text>
  <text x="340" y="180" text-anchor="middle" fill="#374151" font-size="12">inhibitory</text>
</svg>
