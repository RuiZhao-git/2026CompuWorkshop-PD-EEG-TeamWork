<svg viewBox="0 0 1180 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif"><defs><linearGradient id="flow" x1="520" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#e2622f"/><stop offset="1" stop-color="#0d9488"/></linearGradient><marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="4.5" orient="auto"><path d="M0,1 L0,8 L7,4.5 z" fill="#0d9488"/></marker></defs><rect x="20" y="28" width="290" height="32" rx="16" fill="#fdeee8"/><path d="M 40 52 L 47 38 L 54 52 Z" fill="#e2622f"/><line x1="47" y1="43" x2="47" y2="48" stroke="#ffffff" stroke-width="1.6"/><circle cx="47" cy="50" r="0.9" fill="#ffffff"/><text x="64" y="49" fill="#a8431f" font-size="13.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">WHERE THE MODEL IS LIMITED</text><rect x="650" y="28" width="250" height="32" rx="16" fill="#e3f4f1"/><circle cx="671" cy="44" r="9" fill="none" stroke="#0f766e" stroke-width="1.8"/><path d="M 667 44 L 670.5 47.5 L 676 41" fill="none" stroke="#0f766e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><text x="688" y="49" fill="#0f766e" font-size="13.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">WHERE IT GOES NEXT</text><rect x="20" y="84" width="500" height="132" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="40" y="120.0" width="60" height="60" rx="14" fill="#fdeee8"/><line x1="48.0" y1="165.0" x2="92.0" y2="165.0" stroke="#cbd5e1" stroke-width="1.3"/><polyline points="48.0,164.0 57.0,160.0 62.0,135.0 67.0,161.0 80.0,158.0 92.0,162.0" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linejoin="round"/><line x1="62.0" y1="135.0" x2="62.0" y2="165.0" stroke="#e2622f" stroke-width="1.2" stroke-dasharray="2 2"/><circle cx="62.0" cy="135.0" r="3.6" fill="#e2622f"/><text x="62.0" y="130.0" fill="#e2622f" font-size="11" font-weight="700" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">α</text><text x="120" y="130" fill="#a8431f" font-size="17.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Alpha only</text><text x="120" y="158" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">One parameter was tuned to the alpha peak,</text><text x="120" y="179" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">so theta and beta stay unexplained.</text><rect x="650" y="84" width="510" height="132" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="670" y="120.0" width="60" height="60" rx="14" fill="#e3f4f1"/><polyline points="678.0,163.0 684.0,156.0 691.0,136.0 697.0,159.0 704.0,139.0 712.0,156.0 722.0,161.0" fill="none" stroke="#0d9488" stroke-width="2.2" stroke-linejoin="round"/><circle cx="684.0" cy="156.0" r="2.6" fill="#0d9488"/><circle cx="691.0" cy="136.0" r="2.6" fill="#0d9488"/><circle cx="704.0" cy="139.0" r="2.6" fill="#0d9488"/><text x="750" y="130" fill="#0f766e" font-size="17.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Fit more than the peak</text><text x="750" y="158" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Match the whole spectrum or connectivity,</text><text x="750" y="179" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">and vary more, to reach theta and beta too.</text><line x1="528" y1="150.0" x2="638" y2="150.0" stroke="url(#flow)" stroke-width="4.5" marker-end="url(#ar)"/><rect x="20" y="238" width="500" height="132" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="40" y="274.0" width="60" height="60" rx="14" fill="#fdeee8"/><rect x="48.0" y="289.0" width="11" height="11" rx="2.2" fill="#334155"/><rect x="48.0" y="308.0" width="11" height="11" rx="2.2" fill="#94a3b8"/><line x1="61.0" y1="295.0" x2="75.0" y2="302.0" stroke="#64748b" stroke-width="1.6"/><line x1="61.0" y1="314.0" x2="75.0" y2="306.0" stroke="#64748b" stroke-width="1.6"/><circle cx="85.0" cy="304.0" r="9" fill="#ffffff" stroke="#e2622f" stroke-width="2"/><text x="85.0" y="307.5" fill="#e2622f" font-size="11" font-weight="700" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">=</text><text x="120" y="284" fill="#a8431f" font-size="17.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Describes, not proves</text><text x="120" y="312" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">A different change could give the same slowing,</text><text x="120" y="333" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">so it re-describes the data, not the cause.</text><rect x="650" y="238" width="510" height="132" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="670" y="274.0" width="60" height="60" rx="14" fill="#e3f4f1"/><rect x="680.0" y="297.0" width="40" height="14" rx="7" fill="#ffffff" stroke="#0d9488" stroke-width="1.8"/><path d="M 700.0 297.0 L 687.0 297.0 a7 7 0 0 0 -7 7 a7 7 0 0 0 7 7 L 700.0 311.0 Z" fill="#0d9488"/><line x1="700.0" y1="297.0" x2="700.0" y2="311.0" stroke="#ffffff" stroke-width="1.4"/><text x="750" y="284" fill="#0f766e" font-size="17.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Anchor it in biology</text><text x="750" y="312" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Tie the fitted inhibition to medication state</text><text x="750" y="333" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">(on vs off L-Dopa) and symptom severity.</text><line x1="528" y1="304.0" x2="638" y2="304.0" stroke="url(#flow)" stroke-width="4.5" marker-end="url(#ar)"/><rect x="20" y="392" width="500" height="132" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="40" y="428.0" width="60" height="60" rx="14" fill="#fdeee8"/><polyline points="48.0,473.0 48.0,465.0 59.0,465.0 59.0,457.0 70.0,457.0 70.0,449.0 81.0,449.0 81.0,442.0 92.0,442.0" fill="none" stroke="#e2622f" stroke-width="2.4" stroke-linejoin="round"/><text x="120" y="438" fill="#a8431f" font-size="17.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Coarse and uniform</text><text x="120" y="466" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Frequency is read in coarse steps,</text><text x="120" y="487" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">on a simplified, all-to-all network.</text><rect x="650" y="392" width="510" height="132" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="670" y="428.0" width="60" height="60" rx="14" fill="#e3f4f1"/><line x1="682.0" y1="448.0" x2="702.0" y2="442.0" stroke="#0d9488" stroke-width="2.6" opacity="0.55"/><line x1="702.0" y1="442.0" x2="718.0" y2="455.0" stroke="#0d9488" stroke-width="1.3" opacity="0.55"/><line x1="682.0" y1="448.0" x2="685.0" y2="469.0" stroke="#0d9488" stroke-width="2.1" opacity="0.55"/><line x1="718.0" y1="455.0" x2="708.0" y2="472.0" stroke="#0d9488" stroke-width="2.9" opacity="0.55"/><line x1="708.0" y1="472.0" x2="685.0" y2="469.0" stroke="#0d9488" stroke-width="1.2" opacity="0.55"/><line x1="702.0" y1="442.0" x2="708.0" y2="472.0" stroke="#0d9488" stroke-width="1.0" opacity="0.55"/><line x1="682.0" y1="448.0" x2="718.0" y2="455.0" stroke="#0d9488" stroke-width="1.6" opacity="0.55"/><circle cx="682.0" cy="448.0" r="4" fill="#0d9488"/><circle cx="702.0" cy="442.0" r="4" fill="#0d9488"/><circle cx="718.0" cy="455.0" r="4" fill="#0d9488"/><circle cx="708.0" cy="472.0" r="4" fill="#0d9488"/><circle cx="685.0" cy="469.0" r="4" fill="#0d9488"/><text x="750" y="438" fill="#0f766e" font-size="17.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Sharper and more realistic</text><text x="750" y="466" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Fit continuously, not from a lookup table,</text><text x="750" y="487" fill="#334155" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">on a real whole-brain connectome.</text><line x1="528" y1="458.0" x2="638" y2="458.0" stroke="url(#flow)" stroke-width="4.5" marker-end="url(#ar)"/></svg>