<svg viewBox="0 0 1180 392" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif"><rect x="16" y="8" width="561" height="176" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="16" y="23" width="4.5" height="146" rx="2" fill="#185FA5"/><rect x="36" y="26" width="30" height="30" rx="9" fill="#eaf1f9"/><g transform="translate(40,30)" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 9 A 8 8 0 0 1 18 6.5"/><polyline points="18,2 18.5,7 13.3,7.4"/><path d="M18.5 13 A 8 8 0 0 1 4 15.5"/><polyline points="4,20 3.5,15 8.7,14.6"/></g><text x="76" y="39" fill="#185FA5" font-size="12" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif" letter-spacing="0.7">REPRODUCIBILITY</text><text x="76" y="55" fill="#0f172a" font-size="16.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Rui</text><text x="38" y="82" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Carrying this end to end, from raw EEG to the fitted model, taught me that</text><text x="38" y="102" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">a result is only as trustworthy as the pipeline behind it; the</text><text x="38" y="122" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">reproducible scripts and the honest recovery check mattered as much as the</text><text x="38" y="142" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">model.</text><rect x="16" y="200" width="561" height="176" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="16" y="215" width="4.5" height="146" rx="2" fill="#a8431f"/><rect x="36" y="218" width="30" height="30" rx="9" fill="#fbeee8"/><g transform="translate(40,222)" fill="none" stroke="#a8431f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2.5 h8 l4 4 v12.5 a1.2 1.2 0 0 1 -1.2 1.2 H6.2 a1.2 1.2 0 0 1 -1.2 -1.2 V3.7 a1.2 1.2 0 0 1 1.2 -1.2 z"/><polyline points="13,2.5 13,6.5 17,6.5"/><line x1="7.5" y1="11" x2="14" y2="11"/><line x1="7.5" y1="14.5" x2="14" y2="14.5"/><line x1="7.5" y1="18" x2="11.5" y2="18"/></g><text x="76" y="231" fill="#a8431f" font-size="12" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif" letter-spacing="0.7">DOCUMENTATION</text><text x="76" y="247" fill="#0f172a" font-size="16.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Melissa</text><text x="38" y="274" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">My biggest learning was how much easier good documentation makes</text><text x="38" y="294" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">everything, whether it's the repository structure, script naming, clear</text><text x="38" y="314" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">responsibilities, or the code itself. It keeps the whole team aligned,</text><text x="38" y="334" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">helps everyone track progress, and makes even complex or unfamiliar</text><text x="38" y="354" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">methods feel more approachable.</text><rect x="603" y="8" width="561" height="176" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="603" y="23" width="4.5" height="146" rx="2" fill="#0d9488"/><rect x="623" y="26" width="30" height="30" rx="9" fill="#e3f4f1"/><g transform="translate(627,30)" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 H18"/><path d="M7 20 V4 L15 2.3 V20"/><circle cx="9" cy="11.4" r="0.95" fill="#0d9488" stroke="none"/></g><text x="663" y="39" fill="#0d9488" font-size="12" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif" letter-spacing="0.7">APPROACHABLE</text><text x="663" y="55" fill="#0f172a" font-size="16.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Jan</text><text x="625" y="82" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">This course taught me that you do not have to be a master programmer to</text><text x="625" y="102" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">meaningfully contribute to, and clinically interpret, advanced</text><text x="625" y="122" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">computational research.</text><rect x="603" y="200" width="561" height="176" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/><rect x="603" y="215" width="4.5" height="146" rx="2" fill="#7c4dd6"/><rect x="623" y="218" width="30" height="30" rx="9" fill="#f0eafb"/><g transform="translate(627,222)" fill="none" stroke="#7c4dd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.6 a2 2 0 0 1 2 -2 h12 a2 2 0 0 1 2 2 v7.6 a2 2 0 0 1 -2 2 H9 l-4 3.4 V15.2 H5 a2 2 0 0 1 -2 -2 z"/><line x1="7" y1="8" x2="15" y2="8"/><line x1="7" y1="11.4" x2="13" y2="11.4"/></g><text x="663" y="231" fill="#7c4dd6" font-size="12" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif" letter-spacing="0.7">COMMUNICATION</text><text x="663" y="247" fill="#0f172a" font-size="16.5" font-weight="700" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">Friedrich</text><text x="625" y="274" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">How big a difference good communication makes. Even missing one group</text><text x="625" y="294" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">meeting meant you basically missed all the progress. In-person</text><text x="625" y="314" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">communication is essential to work well together and establish a</text><text x="625" y="334" fill="#3f4b5b" font-size="13.5" font-weight="400" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif">group-wide understanding.</text></svg>