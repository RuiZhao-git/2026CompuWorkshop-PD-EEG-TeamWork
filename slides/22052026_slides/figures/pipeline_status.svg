  <line x1="390" y1="250" x2="420" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="560" y1="250" x2="600" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="800" y1="250" x2="830" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       LEFT BOTTOM BRANCH: 04_compare_features.py (DONE)
       ============================================================ -->

  <rect x="390" y="350" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="490" y="376" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">04_compare_features.py</text>
  <text x="490" y="395" text-anchor="middle" fill="#a7f3d0" font-size="11">stats tests + box plots</text>
  <circle cx="585" cy="355" r="11" fill="#14532d" stroke="white" stroke-width="2" />
  <path d="M580 355 L584 359 L591 351" stroke="white" stroke-width="2.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round" />

  <rect x="390" y="440" width="200" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="490" y="466" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">data-level</text>
  <text x="490" y="485" text-anchor="middle" fill="#6b7280" font-size="12">group stats + figures</text>

  <line x1="490" y1="280" x2="490" y2="350" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="490" y1="410" x2="490" y2="440" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       RIGHT BOTTOM BRANCH: 05_compare_tau.py (DONE)
       ============================================================ -->

  <rect x="800" y="350" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="900" y="376" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">05_compare_tau.py</text>
  <text x="900" y="395" text-anchor="middle" fill="#a7f3d0" font-size="11">stats tests + box plots</text>
  <circle cx="995" cy="355" r="11" fill="#14532d" stroke="white" stroke-width="2" />
  <path d="M990 355 L994 359 L1001 351" stroke="white" stroke-width="2.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round" />

  <rect x="800" y="440" width="200" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="900" y="466" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">model-level</text>
  <text x="900" y="485" text-anchor="middle" fill="#6b7280" font-size="12">group stats + figures</text>

  <line x1="900" y1="280" x2="900" y2="350" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="900" y1="410" x2="900" y2="440" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       LEGEND
       ============================================================ -->

  <g transform="translate(50, 530)">
    <!-- done -->
    <rect x="0" y="-12" width="16" height="16" rx="3" fill="#0f766e" />
    <circle cx="13" cy="-10" r="6" fill="#14532d" stroke="white" stroke-width="1.4" />
    <path d="M10 -10 L12 -8 L16 -13" stroke="white" stroke-width="1.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round" />
    <text x="24" y="0" fill="#374151" font-size="11">done</text>

    <!-- data file -->
    <rect x="120" y="-12" width="16" height="16" fill="#f9fafb" stroke="#6b7280" />
    <text x="144" y="0" fill="#374151" font-size="11">data file</text>
  </g>
</svg>
