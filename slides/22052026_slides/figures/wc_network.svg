<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrowE" markerWidth="10" markerHeight="10" refX="9" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10 L10,5 z" fill="#0f766e" />
    </marker>
    <marker id="barI" markerWidth="6" markerHeight="20" refX="2" refY="10"
            orient="auto" markerUnits="userSpaceOnUse">
      <rect x="0.5" y="1" width="3" height="18" rx="1.5" ry="1.5" fill="#92400e" />
    </marker>
  </defs>

  <!-- ============== top: N=8 ring with all-to-all coupling ============== -->
  <g stroke="#cbd5e1" stroke-width="0.8" opacity="0.85">
    <line x1="200.0" y1="35.0" x2="249.5" y2="55.5" />
    <line x1="200.0" y1="35.0" x2="270.0" y2="105.0" />
    <line x1="200.0" y1="35.0" x2="249.5" y2="154.5" />
    <line x1="200.0" y1="35.0" x2="200.0" y2="175.0" />
    <line x1="200.0" y1="35.0" x2="150.5" y2="154.5" />
    <line x1="200.0" y1="35.0" x2="130.0" y2="105.0" />
    <line x1="200.0" y1="35.0" x2="150.5" y2="55.5" />
    <line x1="249.5" y1="55.5" x2="270.0" y2="105.0" />
    <line x1="249.5" y1="55.5" x2="249.5" y2="154.5" />
    <line x1="249.5" y1="55.5" x2="200.0" y2="175.0" />
    <line x1="249.5" y1="55.5" x2="150.5" y2="154.5" />
    <line x1="249.5" y1="55.5" x2="130.0" y2="105.0" />
    <line x1="249.5" y1="55.5" x2="150.5" y2="55.5" />
    <line x1="270.0" y1="105.0" x2="249.5" y2="154.5" />
    <line x1="270.0" y1="105.0" x2="200.0" y2="175.0" />
    <line x1="270.0" y1="105.0" x2="150.5" y2="154.5" />
    <line x1="270.0" y1="105.0" x2="130.0" y2="105.0" />
    <line x1="270.0" y1="105.0" x2="150.5" y2="55.5" />
    <line x1="249.5" y1="154.5" x2="200.0" y2="175.0" />
    <line x1="249.5" y1="154.5" x2="150.5" y2="154.5" />
    <line x1="249.5" y1="154.5" x2="130.0" y2="105.0" />
    <line x1="249.5" y1="154.5" x2="150.5" y2="55.5" />
    <line x1="200.0" y1="175.0" x2="150.5" y2="154.5" />
    <line x1="200.0" y1="175.0" x2="130.0" y2="105.0" />
    <line x1="200.0" y1="175.0" x2="150.5" y2="55.5" />
    <line x1="150.5" y1="154.5" x2="130.0" y2="105.0" />
    <line x1="150.5" y1="154.5" x2="150.5" y2="55.5" />
    <line x1="130.0" y1="105.0" x2="150.5" y2="55.5" />
  </g>
  <g>
    <circle cx="200.0" cy="35.0" r="11" fill="#0f766e" />
    <circle cx="249.5" cy="55.5" r="11" fill="#0f766e" />
    <circle cx="270.0" cy="105.0" r="11" fill="#0f766e" />
    <circle cx="200.0" cy="175.0" r="11" fill="#0f766e" />
    <circle cx="150.5" cy="154.5" r="11" fill="#0f766e" />
    <circle cx="130.0" cy="105.0" r="11" fill="#0f766e" />
    <circle cx="150.5" cy="55.5" r="11" fill="#0f766e" />
  </g>

  <!-- highlighted node with a glow ring -->
  <circle cx="249.5" cy="154.5" r="16" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="3 2" />
  <circle cx="249.5" cy="154.5" r="11" fill="#0f766e" />

  <!-- network label -->
  <text x="200" y="208" text-anchor="middle" fill="#374151"
        font-size="13" font-weight="500">N = 8 cortical units, all-to-all coupling</text>

  <!-- ============== zoom-in connector ============== -->
  <!-- dashed lines from the highlighted node "zooming" down to the detail panel -->
  <line x1="263.5" y1="164.5" x2="305" y2="290" stroke="#f59e0b"
        stroke-width="1.5" stroke-dasharray="4 3" opacity="0.85" />
  <line x1="245.5" y1="170.5" x2="95" y2="290" stroke="#f59e0b"
        stroke-width="1.5" stroke-dasharray="4 3" opacity="0.85" />

  <!-- "Inside one node" header above detail -->
  <text x="200" y="275" text-anchor="middle" fill="#92400e"
        font-size="13" font-weight="700" letter-spacing="0.4">Inside one node</text>

  <!-- ============== bottom: E ↔ I detail (boxed) ============== -->
  <rect x="60" y="290" width="280" height="180" rx="10"
        fill="#fffbeb" stroke="#fbbf24" stroke-width="1" opacity="0.65" />

  <!-- E -> I, top arc, excitatory -->
  <path d="M 135 365 Q 200 320 265 365" fill="none" stroke="#0f766e"
        stroke-width="2.5" marker-end="url(#arrowE)" />
  <text x="200" y="316" text-anchor="middle" fill="#0f766e"
        font-size="12" font-weight="500">excites</text>

  <!-- I -> E, bottom arc, inhibitory -->
  <path d="M 265 385 Q 200 432 135 385" fill="none" stroke="#92400e"
        stroke-width="2.5" marker-end="url(#barI)" />
  <text x="200" y="445" text-anchor="middle" fill="#92400e"
        font-size="12" font-weight="500">inhibits</text>

  <!-- E circle -->
  <circle cx="100" cy="375" r="32" fill="#0f766e" />
  <text x="100" y="383" text-anchor="middle" fill="white"
        font-size="22" font-weight="700">E</text>
  <text x="100" y="424" text-anchor="middle" fill="#374151" font-size="11">excitatory · τ_E</text>

  <!-- I circle -->
  <circle cx="300" cy="375" r="32" fill="#92400e" />
  <text x="300" y="383" text-anchor="middle" fill="white"
        font-size="22" font-weight="700">I</text>
  <text x="300" y="424" text-anchor="middle" fill="#374151" font-size="11">inhibitory · τ_inh</text>

  <!-- free parameter highlight -->
  <rect x="138" y="478" width="124" height="20" rx="3"
        fill="#fef3c7" stroke="#92400e" stroke-width="1" />
  <text x="200" y="492" text-anchor="middle" fill="#92400e"
        font-size="11" font-weight="600">τ_inh: free parameter</text>
</svg>
