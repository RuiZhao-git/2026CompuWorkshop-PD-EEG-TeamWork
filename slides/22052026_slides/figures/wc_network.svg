<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 470"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrowE" markerWidth="10" markerHeight="10" refX="9" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10 L10,5 z" fill="#0f766e" />
    </marker>
    <marker id="barI" markerWidth="6" markerHeight="20" refX="2" refY="10"
            orient="auto" markerUnits="userSpaceOnUse">
      <rect x="0.5" y="1" width="3" height="18" rx="1.5" ry="1.5" fill="#92400e" />
    </marker>
  </defs>

  <!-- ============== top: N=8 ring with all-to-all coupling ============== -->
  <g stroke="#cbd5e1" stroke-width="0.8" opacity="0.85">
    <line x1="200.0" y1="38.0" x2="250.9" y2="59.1" />
    <line x1="200.0" y1="38.0" x2="272.0" y2="110.0" />
    <line x1="200.0" y1="38.0" x2="250.9" y2="160.9" />
    <line x1="200.0" y1="38.0" x2="200.0" y2="182.0" />
    <line x1="200.0" y1="38.0" x2="149.1" y2="160.9" />
    <line x1="200.0" y1="38.0" x2="128.0" y2="110.0" />
    <line x1="200.0" y1="38.0" x2="149.1" y2="59.1" />
    <line x1="250.9" y1="59.1" x2="272.0" y2="110.0" />
    <line x1="250.9" y1="59.1" x2="250.9" y2="160.9" />
    <line x1="250.9" y1="59.1" x2="200.0" y2="182.0" />
    <line x1="250.9" y1="59.1" x2="149.1" y2="160.9" />
    <line x1="250.9" y1="59.1" x2="128.0" y2="110.0" />
    <line x1="250.9" y1="59.1" x2="149.1" y2="59.1" />
    <line x1="272.0" y1="110.0" x2="250.9" y2="160.9" />
    <line x1="272.0" y1="110.0" x2="200.0" y2="182.0" />
    <line x1="272.0" y1="110.0" x2="149.1" y2="160.9" />
    <line x1="272.0" y1="110.0" x2="128.0" y2="110.0" />
    <line x1="272.0" y1="110.0" x2="149.1" y2="59.1" />
    <line x1="250.9" y1="160.9" x2="200.0" y2="182.0" />
    <line x1="250.9" y1="160.9" x2="149.1" y2="160.9" />
    <line x1="250.9" y1="160.9" x2="128.0" y2="110.0" />
    <line x1="250.9" y1="160.9" x2="149.1" y2="59.1" />
    <line x1="200.0" y1="182.0" x2="149.1" y2="160.9" />
    <line x1="200.0" y1="182.0" x2="128.0" y2="110.0" />
    <line x1="200.0" y1="182.0" x2="149.1" y2="59.1" />
    <line x1="149.1" y1="160.9" x2="128.0" y2="110.0" />
    <line x1="149.1" y1="160.9" x2="149.1" y2="59.1" />
    <line x1="128.0" y1="110.0" x2="149.1" y2="59.1" />
  </g>
  <g>
    <circle cx="200.0" cy="38.0" r="11" fill="#0f766e" />
    <circle cx="250.9" cy="59.1" r="11" fill="#0f766e" />
    <circle cx="272.0" cy="110.0" r="11" fill="#0f766e" />
    <circle cx="250.9" cy="160.9" r="11" fill="#0f766e" />
    <circle cx="200.0" cy="182.0" r="11" fill="#0f766e" />
    <circle cx="149.1" cy="160.9" r="11" fill="#0f766e" />
    <circle cx="128.0" cy="110.0" r="11" fill="#0f766e" />
    <circle cx="149.1" cy="59.1" r="11" fill="#0f766e" />
  </g>

  <!-- coupling annotation -->
  <text x="200" y="215" text-anchor="middle" fill="#374151"
        font-size="13" font-weight="500">N = 8 Wilson-Cowan units, all-to-all coupling</text>
  <text x="200" y="232" text-anchor="middle" fill="#6b7280"
        font-size="11">global coupling strength K_gl</text>

  <!-- arrow linking ring to node detail -->
  <path d="M 200 248 L 200 270" stroke="#9ca3af" stroke-width="1.5"
        marker-end="url(#arrowE)" />
  <text x="210" y="265" fill="#374151" font-size="12" font-style="italic">each node</text>

  <!-- ============== bottom: single-node E/I detail ============== -->

  <!-- E -> I, top arc, excitatory -->
  <path d="M 135 332 Q 200 282 265 332" fill="none" stroke="#0f766e"
        stroke-width="2.5" marker-end="url(#arrowE)" />
  <text x="200" y="280" text-anchor="middle" fill="#0f766e"
        font-size="12" font-weight="500">excites (w_EI)</text>

  <!-- I -> E, bottom arc, inhibitory -->
  <path d="M 265 352 Q 200 402 135 352" fill="none" stroke="#92400e"
        stroke-width="2.5" marker-end="url(#barI)" />
  <text x="200" y="416" text-anchor="middle" fill="#92400e"
        font-size="12" font-weight="500">inhibits (w_IE)</text>

  <!-- E circle -->
  <circle cx="100" cy="342" r="32" fill="#0f766e" />
  <text x="100" y="350" text-anchor="middle" fill="white"
        font-size="22" font-weight="700">E</text>
  <text x="100" y="392" text-anchor="middle" fill="#374151" font-size="11">τ_E excitatory</text>

  <!-- I circle -->
  <circle cx="300" cy="342" r="32" fill="#92400e" />
  <text x="300" y="350" text-anchor="middle" fill="white"
        font-size="22" font-weight="700">I</text>
  <text x="300" y="392" text-anchor="middle" fill="#374151" font-size="11">τ_inh inhibitory</text>

  <!-- highlight tau_inh as free parameter -->
  <rect x="240" y="438" width="120" height="22" rx="3"
        fill="#fef3c7" stroke="#92400e" stroke-width="1" />
  <text x="300" y="453" text-anchor="middle" fill="#92400e"
        font-size="11" font-weight="600">τ_inh: free parameter</text>
</svg>
