<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 540"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10 L10,5 z" fill="#6b7280" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="525" y="34" text-anchor="middle" fill="#111827"
        font-size="18" font-weight="700" letter-spacing="0.2">Pipeline overview</text>

  <!-- ============================================================
       TOP BRANCH: model simulation produces tau-vs-peak curve
       ============================================================ -->

  <rect x="400" y="80" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="500" y="106" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">02_simulate_network.py</text>
  <text x="500" y="125" text-anchor="middle" fill="#a7f3d0" font-size="11">uses src/model.py</text>

  <rect x="630" y="80" width="140" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="700" y="106" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">peak_curve</text>
  <text x="700" y="125" text-anchor="middle" fill="#6b7280" font-size="12">.csv</text>

  <line x1="600" y1="110" x2="630" y2="110" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="700" y1="140" x2="700" y2="220" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       MIDDLE BRANCH: data extraction and per-subject fitting
       ============================================================ -->

  <rect x="50" y="220" width="110" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="105" y="246" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">.fif files</text>
  <text x="105" y="265" text-anchor="middle" fill="#6b7280" font-size="12">n = 149</text>

  <rect x="190" y="220" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="290" y="246" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">01_extract_features.py</text>
  <text x="290" y="265" text-anchor="middle" fill="#a7f3d0" font-size="11">uses src/features.py</text>

  <rect x="420" y="220" width="140" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="490" y="246" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">features</text>
  <text x="490" y="265" text-anchor="middle" fill="#6b7280" font-size="12">.csv</text>

  <rect x="600" y="220" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="700" y="246" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">03_fit_per_subject.py</text>
  <text x="700" y="265" text-anchor="middle" fill="#a7f3d0" font-size="11">uses src/fitting.py</text>

  <rect x="830" y="220" width="140" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="900" y="246" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">fitted_tau</text>
  <text x="900" y="265" text-anchor="middle" fill="#6b7280" font-size="12">.csv</text>

  <line x1="160" y1="250" x2="190" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="390" y1="250" x2="420" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="560" y1="250" x2="600" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="800" y1="250" x2="830" y2="250" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       LEFT BOTTOM BRANCH: data-level group comparison
       ============================================================ -->

  <rect x="390" y="340" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="490" y="366" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">04_compare_features.py</text>
  <text x="490" y="385" text-anchor="middle" fill="#a7f3d0" font-size="11">stats tests + box plots</text>

  <rect x="390" y="430" width="200" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="490" y="456" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">data-level</text>
  <text x="490" y="475" text-anchor="middle" fill="#6b7280" font-size="12">group stats + figures</text>

  <line x1="490" y1="280" x2="490" y2="340" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="490" y1="400" x2="490" y2="430" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       RIGHT BOTTOM BRANCH: model-level group comparison
       ============================================================ -->

  <rect x="800" y="340" width="200" height="60" rx="8" fill="#0f766e" stroke="#0f766e" />
  <text x="900" y="366" text-anchor="middle" fill="white"
        font-size="14" font-weight="600">05_compare_tau.py</text>
  <text x="900" y="385" text-anchor="middle" fill="#a7f3d0" font-size="11">stats tests + box plots</text>

  <rect x="800" y="430" width="200" height="60" fill="#f9fafb" stroke="#6b7280" />
  <text x="900" y="456" text-anchor="middle" fill="#1f2937"
        font-size="14" font-weight="600">model-level</text>
  <text x="900" y="475" text-anchor="middle" fill="#6b7280" font-size="12">group stats + figures</text>

  <line x1="900" y1="280" x2="900" y2="340" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />
  <line x1="900" y1="400" x2="900" y2="430" stroke="#6b7280"
        stroke-width="2" marker-end="url(#arrow)" />

  <!-- ============================================================
       LEGEND
       ============================================================ -->

  <g transform="translate(50, 510)">
    <rect x="0" y="-12" width="16" height="16" rx="3" fill="#0f766e" />
    <text x="22" y="0" fill="#374151" font-size="11">scripts (executable)</text>

    <rect x="160" y="-12" width="16" height="16" fill="#f9fafb" stroke="#6b7280" />
    <text x="182" y="0" fill="#374151" font-size="11">data files (CSV / .fif)</text>
  </g>
</svg>
